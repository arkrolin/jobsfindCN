# ============================================================
# 八股文能力画像（系统管理，角色驱动，build-profile 时激活）
# ============================================================
baguwen_mastery:
  role: ""                   # 当前激活的角色分类（如 "java-backend"）
  categories: {}             # 由 build-profile 根据角色自动填充
  overall_level: 1
  questions_reviewed: 0

# ============================================================
# 用户偏好
# ============================================================
preferences:
  programming_language: "Java"    # 刷题主语言
  practice_frequency: "每周3-5题" # 目标练习频率
  weak_areas_priority: []         # 薄弱项（系统自动识别）
  next_review_date: null
