# jobsfindCN Profile Configuration
# 复制此文件为 data/profile.yml 并填写你的信息。
# 所有模式从此文件读取用户数据。

candidate:
  full_name: ""
  email: ""
  phone: ""
  location: ""               # 如：北京 / 上海 / 杭州 / 深圳
  education:
    school: ""
    major: ""
    degree: ""               # 本科 / 硕士 / 博士
    graduation_year: null
  work_experience:
    years: 0
    current_company: ""
    current_role: ""
  linkedin: ""
  github: ""

target_roles:
  primary: []                # 如：["Java 后端开发工程师", "算法工程师"]
  companies:
    tier1: []                # 一线大厂：字节/腾讯/阿里/美团/拼多多
    tier2: []                # 二线/独角兽：小红书/快手/B站/得物
    tier3: []                # 外企/其他：Microsoft/Amazon/Zoom

narrative:
  headline: ""               # 一句话职业标签
  exit_story: ""             # 求职动机 / 离职原因
  superpowers: []            # 3-5 个最突出的能力
  proof_points:              # 可量化的项目和成果
    - name: ""
      description: ""

compensation:
  target_range: ""           # 目标年包（万），如"40-55万/年"
  currency: "CNY"
  minimum: ""                # 底线年包
  location_flexibility: ""   # 如"仅北京" / "北京/上海均可"

